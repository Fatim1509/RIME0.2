version: '3.8'

services:
  # ============================================
  # PostgreSQL Database
  # ============================================
  postgres:
    image: postgres:15-alpine
    container_name: rime-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-rime}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-password}
      POSTGRES_DB: ${POSTGRES_DB:-rime}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-rime}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rime-network

  # ============================================
  # Redis Cache
  # ============================================
  redis:
    image: redis:7-alpine
    container_name: rime-redis
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - rime-network

  # ============================================
  # Screen Capture Service (Python)
  # ============================================
  screen-service:
    build:
      context: ../services/screen-service
      dockerfile: Dockerfile
    container_name: rime-screen-service
    restart: unless-stopped
    environment:
      - PORT=${SCREEN_SERVICE_PORT:-8000}
      - CAPTURE_INTERVAL=${CAPTURE_INTERVAL:-3000}
      - SCREENSHOT_QUALITY=${SCREENSHOT_QUALITY:-85}
      - MAX_SCREENSHOTS=${MAX_SCREENSHOTS:-50}
    ports:
      - "${SCREEN_SERVICE_PORT:-8000}:${SCREEN_SERVICE_PORT:-8000}"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${SCREEN_SERVICE_PORT:-8000}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rime-network

  # ============================================
  # Core Engine (Node.js)
  # ============================================
  core-engine:
    build:
      context: ../services/core-engine
      dockerfile: Dockerfile
    container_name: rime-core-engine
    restart: unless-stopped
    environment:
      - NODE_ENV=${NODE_ENV:-development}
      - PORT=${PORT:-3001}
      - DATABASE_URL=${DATABASE_URL:-postgresql://rime:password@postgres:5432/rime}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - GEMINI_API_KEY=${GEMINI_API_KEY}
      - GEMINI_MODEL=${GEMINI_MODEL:-gemini-2.0-flash-exp}
      - SCREEN_SERVICE_URL=http://screen-service:${SCREEN_SERVICE_PORT:-8000}
      - PINECONE_API_KEY=${PINECONE_API_KEY}
      - ENABLE_MOCK=${ENABLE_MOCK:-true}
      - LOG_LEVEL=${LOG_LEVEL:-debug}
    ports:
      - "${PORT:-3001}:${PORT:-3001}"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      screen-service:
        condition: service_started
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:${PORT:-3001}/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    networks:
      - rime-network
    volumes:
      - ../services/core-engine/src:/app/src
      - /app/node_modules

  # ============================================
  # Dashboard (Next.js)
  # ============================================
  dashboard:
    build:
      context: ../apps/dashboard
      dockerfile: Dockerfile
    container_name: rime-dashboard
    restart: unless-stopped
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:3001
      - NEXT_PUBLIC_WS_URL=ws://localhost:3001
    ports:
      - "3000:3000"
    depends_on:
      - core-engine
    networks:
      - rime-network

  # ============================================
  # Nginx Reverse Proxy
  # ============================================
  nginx:
    image: nginx:alpine
    container_name: rime-nginx
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - core-engine
      - dashboard
    networks:
      - rime-network

# ============================================
# Volumes
# ============================================
volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

# ============================================
# Networks
# ============================================
networks:
  rime-network:
    driver: bridge
